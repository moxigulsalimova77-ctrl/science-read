<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Science LMS Firebase</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  background:linear-gradient(90deg,#4f46e5,#06b6d4);
}

.container{padding:20px;}

.card{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.admin{
  background:#f59e0b;
}

.add{
  background:#22c55e;
}

.del{
  background:#ef4444;
}

.option{
  background:#1f2937;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
📚 4-SINF TABIIY FANLAR (FIREBASE REAL)
</header>

<div class="container">

<button class="admin" onclick="login()">Admin</button>

<div id="adminPanel" style="display:none" class="card">
<h3>➕ Mavzu qo‘shish</h3>

<input id="title" placeholder="Mavzu nomi">
<textarea id="desc" placeholder="Mavzu matni"></textarea>

<button class="add" onclick="addTopic()">Saqlash</button>
</div>

<h2>Mavzular</h2>
<div id="topics"></div>

<div id="lesson"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 Firebase config (sening project)
const firebaseConfig = {
  apiKey: "AIzaSyCcoCX94i2eIMXWyP3zW2dwDARcECvDMr8",
  authDomain: "science-read.firebaseapp.com",
  projectId: "science-read",
  storageBucket: "science-read.firebasestorage.app",
  messagingSenderId: "1070431247250",
  appId: "1:1070431247250:web:423376924d1d29224bff4b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ADMIN LOGIN */
function login(){
  let p = prompt("Admin kod:");
  if(p==="1234"){
    document.getElementById("adminPanel").style.display="block";
  }
}

/* ADD TOPIC */
function addTopic(){
  db.collection("topics").add({
    title: document.getElementById("title").value,
    desc: document.getElementById("desc").value
  });

  document.getElementById("title").value="";
  document.getElementById("desc").value="";
}

/* LOAD REAL TIME */
db.collection("topics").onSnapshot(snap=>{
  let box=document.getElementById("topics");
  box.innerHTML="";

  snap.forEach(doc=>{
    let d=doc.data();

    box.innerHTML+=`
      <div class="card">
        <h3 onclick="openTopic('${doc.id}')">${d.title}</h3>
        <button class="del" onclick="deleteTopic('${doc.id}')">O‘chirish</button>
      </div>
    `;
  });
});

/* OPEN TOPIC */
function openTopic(id){
  db.collection("topics").doc(id).get().then(doc=>{
    let d=doc.data();

    document.getElementById("lesson").innerHTML=`
      <div class="card">
        <h2>${d.title}</h2>
        <p>${d.desc}</p>

        <h3>📝 Test</h3>
        <div class="option" onclick="alert('To‘g‘ri')">Variant A</div>
        <div class="option" onclick="alert('Noto‘g‘ri')">Variant B</div>
      </div>
    `;
  });
}

/* DELETE */
function deleteTopic(id){
  db.collection("topics").doc(id).delete();
}

</script>

</body>
</html>
