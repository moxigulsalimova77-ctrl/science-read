<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science Read</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

    body{
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      min-height:100vh;
    }

    /* NAVBAR */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      background:rgba(0,0,0,0.3);
      position:sticky;
      top:0;
      backdrop-filter:blur(10px);
    }

    nav h1{
      font-size:22px;
      color:#38bdf8;
    }

    nav ul{
      display:flex;
      list-style:none;
      gap:20px;
    }

    nav ul li{
      cursor:pointer;
      transition:0.3s;
    }

    nav ul li:hover{
      color:#38bdf8;
    }

    /* HERO */
    .hero{
      text-align:center;
      padding:100px 20px;
    }

    .hero h2{
      font-size:48px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:18px;
      opacity:0.8;
      margin-bottom:30px;
    }

    .btn{
      padding:12px 25px;
      background:#38bdf8;
      border:none;
      border-radius:8px;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    /* CARDS */
    .section{
      padding:60px 20px;
      text-align:center;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:rgba(255,255,255,0.1);
      padding:20px;
      border-radius:12px;
      width:250px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      background:rgba(56,189,248,0.2);
    }

    footer{
      text-align:center;
      padding:20px;
      margin-top:40px;
      opacity:0.6;
    }
  </style>
</head>
<body>

  <nav>
    <h1>Science Read</h1>
    <ul>
      <li>Home</li>
      <li>Courses</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
  </nav>

  <section class="hero">
    <h2>Ilmiy Platforma 🚀</h2>
    <p>Bilim o‘rganish uchun zamonaviy web sayt</p>
    <button class="btn" onclick="alert('Welcome to Science Read!')">Boshlash</button>
  </section>

  <section class="section">
    <h2>Bo‘limlar</h2>
    <div class="cards">
      <div class="card">
        <h3>📘 Matematika</h3>
        <p>Formulalar va misollar</p>
      </div>
      <div class="card">
        <h3>🔬 Fizika</h3>
        <p>Ilmiy qonunlar</p>
      </div>
      <div class="card">
        <h3>🧪 Kimyo</h3>
        <p>Reaksiyalar va elementlar</p>
      </div>
    </div>
  </section>

  <footer>
    © 2026 Science Read | Created with GitHub Pages
  </footer>

</body>
</html>
