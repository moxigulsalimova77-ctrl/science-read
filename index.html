<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-sinf Tabiiy Fan Platforma</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
  color:white;
}

.header{
  padding:20px;
  text-align:center;
  font-size:22px;
}

.container{padding:15px;}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  cursor:pointer;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
}

.admin{
  background:#f59e0b;
}

.add{
  background:#22c55e;
}

.delete{
  background:#ef4444;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

.hidden{display:none;}

.option{
  background:rgba(255,255,255,0.1);
  padding:10px;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
👋 Qadrli o‘quvchi! 4-sinf Tabiiy fanlar darsiga xush kelibsan!
</div>

<div class="container">

<button class="admin" onclick="loginAdmin()">Admin</button>

<div id="adminPanel" class="hidden">

<h3>🔐 Admin Panel</h3>

<input id="title" placeholder="Mavzu nomi">
<textarea id="text" placeholder="Mavzu tushuntirishi"></textarea>

<button class="add" onclick="addTopic()">+ Qo‘shish</button>

</div>

<h3>📚 Mavzular</h3>
<div id="topics"></div>

<div id="lesson" class="hidden"></div>

</div>

<script>

let topics = JSON.parse(localStorage.getItem("topics")) || [
{
title:"Modda nima?",
text:`Modda — bu atrofimizdagi hamma narsani tashkil qiladigan material.
Siz ko‘rayotgan stol, kitob, suv, havo — hammasi modda.`,
test:[
{q:"Modda nima?",a:["Hamma narsaning materiali","Faqat suv","Faqat havo"],c:0}
]
},
{
title:"Atmosfera",
text:`Atmosfera — Yer sharini o‘rab turgan havo qatlami.`,
test:[
{q:"Atmosfera nima?",a:["Havo qatlami","Suv","Tosh"],c:0}
]
}
];

function save(){
localStorage.setItem("topics",JSON.stringify(topics));
}

function render(){
let box=document.getElementById("topics");
box.innerHTML="";
topics.forEach((t,i)=>{
box.innerHTML+=`
<div class="card">
<h3 onclick="openTopic(${i})">${t.title}</h3>
<button class="delete" onclick="del(${i})">O‘chirish</button>
</div>
`;
});
}

function openTopic(i){
let t=topics[i];
document.getElementById("lesson").classList.remove("hidden");

document.getElementById("lesson").innerHTML=`
<h2>${t.title}</h2>
<p>${t.text}</p>

<h3>📝 Test</h3>
<div>${t.test[0].q}</div>
${t.test[0].a.map((o,j)=>`
<div class="option" onclick="check(${j},${t.test[0].c})">${o}</div>
`).join("")}
`;
}

function check(a,c){
if(a===c) alert("To‘g‘ri 👍");
else alert("Noto‘g‘ri ❌");
}

function addTopic(){
let t=document.getElementById("title").value;
let text=document.getElementById("text").value;

topics.push({
title:t,
text:text,
test:[{q:"Savol qo‘shiladi",a:["A","B","C"],c:0}]
});

save();
render();
}

function del(i){
topics.splice(i,1);
save();
render();
}

function loginAdmin(){
let pass=prompt("Admin kodni kiriting:");
if(pass==="1234"){
document.getElementById("adminPanel").classList.remove("hidden");
alert("Admin ochildi");
}else{
alert("Xato kod");
}
}

render();

</script>

</body>
</html>
