<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Science Read - 4 sinf</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Roboto;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:linear-gradient(90deg,#4f46e5,#06b6d4);
  font-size:20px;
  font-weight:bold;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
  border:1px solid #1f2937;
}

.card:hover{
  transform:scale(1.02);
  border-color:#38bdf8;
}

/* BUTTONS */
button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.adminBtn{background:#f59e0b;color:black;}
.addBtn{background:#22c55e;}
.delBtn{background:#ef4444;}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}

/* OPTION */
.option{
  background:#1f2937;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:#38bdf8;
  color:black;
}

/* LAYOUT SECTIONS */
.hidden{display:none;}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<header>
👋 4-sinf Tabiiy fanlar | Science Read
</header>

<div class="container">

<div class="topBar">
<button class="adminBtn" onclick="login()">Admin</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">
<h3>🛠 Admin Dashboard</h3>

<input id="title" placeholder="Mavzu nomi"/>
<textarea id="desc" placeholder="Dars matni"></textarea>

<button class="addBtn" onclick="addTopic()">+ Saqlash</button>
</div>

<h3>📚 Mavzular</h3>
<div id="topics"></div>

<div id="lesson"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCcoCX94i2eIMXWyP3wZ2dwDARcECvDMr8",
  authDomain: "science-read.firebaseapp.com",
  projectId: "science-read",
  storageBucket: "science-read.firebasestorage.app",
  messagingSenderId: "1070431247250",
  appId: "1:1070431247250:web:423376924d1d29224bff4b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentId = null;

/* ADMIN LOGIN */
function login(){
  let p = prompt("Admin kod:");
  if(p==="1234"){
    document.getElementById("adminPanel").classList.remove("hidden");
    alert("Admin ochildi");
  }
}

/* LOAD TOPICS */
db.collection("topics").onSnapshot(snap=>{
  let box = document.getElementById("topics");
  box.innerHTML="";

  snap.forEach(doc=>{
    let d = doc.data();

    box.innerHTML += `
      <div class="card">
        <h3 onclick="openTopic('${doc.id}')">${d.title}</h3>
        <button class="delBtn" onclick="deleteTopic('${doc.id}')">O‘chirish</button>
      </div>
    `;
  });
});

/* ADD / SAVE */
function addTopic(){
  let title = document.getElementById("title").value;
  let desc = document.getElementById("desc").value;

  if(currentId){
    db.collection("topics").doc(currentId).update({title,desc});
    currentId = null;
  } else {
    db.collection("topics").add({title,desc});
  }

  document.getElementById("title").value="";
  document.getElementById("desc").value="";
}

/* DELETE */
function deleteTopic(id){
  db.collection("topics").doc(id).delete();
}

/* OPEN TOPIC */
function openTopic(id){
  db.collection("topics").doc(id).get().then(doc=>{
    let d = doc.data();
    currentId = id;

    document.getElementById("lesson").innerHTML = `
      <div class="card">
        <h2>${d.title}</h2>
        <p>${d.desc}</p>
      </div>

      <h3>📝 Test</h3>

      <div class="option" onclick="alert('To‘g‘ri 👍')">A variant</div>
      <div class="option" onclick="alert('Noto‘g‘ri ❌')">B variant</div>
      <div class="option" onclick="alert('Noto‘g‘ri ❌')">C variant</div>

      <h3>✍ PIRLS savol</h3>
      <textarea placeholder="Javob yozing..."></textarea>

      <h3>🖼 Rasm topshiriq</h3>
      <div class="option">Rasm 1</div>
      <div class="option">Rasm 2</div>
    `;
  });
}
</script>

</body>
</html>
