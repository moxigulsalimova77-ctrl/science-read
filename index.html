<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>4-sinf Tabiiy fanlar</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
  color:white;
}

header{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  cursor:pointer;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.admin{background:#f59e0b;}
.add{background:#22c55e;}
.del{background:#ef4444;}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

.hidden{display:none;}

.option{
  background:rgba(255,255,255,0.15);
  padding:10px;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
👋 Qadrli o‘quvchi! 4-sinf Tabiiy fanlar platformasiga xush kelibsan!
</header>

<div class="container">

<button class="admin" onclick="login()">Admin</button>

<div id="adminPanel" class="hidden">

<h3>🛠 Admin panel</h3>

<input id="title" placeholder="Mavzu nomi">
<textarea id="desc" placeholder="Mavzu matni"></textarea>

<button class="add" onclick="addTopic()">+ Qo‘shish</button>

</div>

<h3>📚 Mavzular</h3>
<div id="topics"></div>

<div id="lesson"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCcoCX94i2eIMXWyP3wZ2dwDARcECvDMr8",
  authDomain: "science-read.firebaseapp.com",
  projectId: "science-read",
  storageBucket: "science-read.firebasestorage.app",
  messagingSenderId: "1070431247250",
  appId: "1:1070431247250:web:423376924d1d29224bff4b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 ADMIN
function login(){
  let p = prompt("Admin kod:");
  if(p==="1234"){
    document.getElementById("adminPanel").classList.remove("hidden");
    alert("Admin ochildi");
  } else alert("Xato kod");
}

// 📚 LOAD TOPICS
function loadTopics(){
  db.collection("topics").onSnapshot(snap=>{
    let box = document.getElementById("topics");
    box.innerHTML="";

    snap.forEach(doc=>{
      let d = doc.data();

      box.innerHTML += `
        <div class="card">
          <h3 onclick="openTopic('${doc.id}')">${d.title}</h3>
          <button class="del" onclick="delTopic('${doc.id}')">O‘chirish</button>
        </div>
      `;
    });
  });
}

// ➕ ADD TOPIC
function addTopic(){
  let t = document.getElementById("title").value;
  let d = document.getElementById("desc").value;

  db.collection("topics").add({
    title:t,
    desc:d
  });

  document.getElementById("title").value="";
  document.getElementById("desc").value="";
}

// ❌ DELETE
function delTopic(id){
  db.collection("topics").doc(id).delete();
}

// 📖 OPEN TOPIC
function openTopic(id){
  db.collection("topics").doc(id).get().then(doc=>{
    let d = doc.data();

    document.getElementById("lesson").innerHTML=`
      <h2>${d.title}</h2>
      <p>${d.desc}</p>

      <h3>📝 Test</h3>

      <div class="option" onclick="alert('To‘g‘ri 👍')">1. Variant A</div>
      <div class="option" onclick="alert('Noto‘g‘ri ❌')">2. Variant B</div>
      <div class="option" onclick="alert('Noto‘g‘ri ❌')">3. Variant C</div>
    `;
  });
}

loadTopics();
</script>

</body>
</html>
