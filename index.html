<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 TIMSS PIRLS Platforma</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
  color:white;
}

.container{
  padding:20px;
  text-align:center;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  margin:10px;
  border-radius:15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.choice{
  background:#38bdf8;
}

.next{
  background:#22c55e;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h2 id="title">🌿 Modda nima?</h2>

<p id="text">Modda — atrofimizdagi barcha narsalarning asosi.</p>

<div id="menu">

<button class="choice" onclick="openTest()">📝 Test</button>
<button class="choice" onclick="openText()">✍ Matnli savol</button>
<button class="choice" onclick="openImage()">🖼 Rasmli topshiriq</button>

</div>

<div id="content"></div>

<button class="next" onclick="nextTopic()">➡ Keyingi mavzu</button>
<button class="next" onclick="showResult()">🏁 Natija</button>

</div>

<script>

let topics=[
"Modda nima?",
"Atmosfera",
"Havoning xossalari",
"Suv va uning xossalari",
"Suv manbalari",
"O‘zbekiston suv manbalari",
"Suvni asrash",
"Suv uyga qanday keladi",
"Toza suv qanday olinadi"
];

let i=0;
let score=0;

function loadTopic(){
document.getElementById("title").innerText=topics[i];
document.getElementById("content").innerHTML="";
}

function openTest(){
document.getElementById("content").innerHTML=`
<p>Modda nima?</p>
<button onclick="answer(true)">Hamma narsaning tarkibi</button><br>
<button onclick="answer(false)">Faqat suv</button>
`;
}

function openText(){
document.getElementById("content").innerHTML=
"<p>Savol: Bu mavzuni hayotda qayerda ko‘rasan?</p>";
}

function openImage(){
document.getElementById("content").innerHTML=
"<p>Rasm topshiriq: suv aylanishini tasavvur qil</p>";
}

function answer(v){
if(v) score++;
alert("Javob qabul qilindi");
}

function nextTopic(){
if(i<topics.length-1){
i++;
loadTopic();
}else{
alert("Oxirgi mavzu");
}
}

function showResult(){
alert("Natija: "+score);
}

loadTopic();

</script>

</body>
</html>
