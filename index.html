<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tabiiy fanlar - 4 sinf</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
  color:white;
}

/* HOME */
.home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:20px;
}

.startBtn{
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  font-size:18px;
  background:#22c55e;
  color:black;
  cursor:pointer;
}

/* TOPICS */
.container{padding:20px;}

.topic{
  background:rgba(255,255,255,0.15);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  font-size:18px;
  cursor:pointer;
}

/* ADMIN */
.adminBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#f59e0b;
  padding:10px;
  border:none;
  border-radius:10px;
}

.panel{
  background:#111827;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ADMIN -->
<button class="adminBtn" onclick="login()">Admin</button>

<!-- HOME -->
<div id="home" class="home">
  <div class="title">Qadrli o‘quvchi, tabiiy fanlarga xush kelibsan!</div>
  <button class="startBtn" onclick="showTopics()">Boshlash</button>
</div>

<!-- TOPICS -->
<div id="topics" class="container" style="display:none">

<div id="adminPanel" style="display:none" class="panel">
<h3>Admin panel</h3>
<input id="title" placeholder="Mavzu nomi"/>
<textarea id="desc" placeholder="Mavzu matni"></textarea>
<button onclick="addTopic()">Saqlash</button>
</div>

<h2>Mavzular</h2>
<div id="list"></div>

<div id="lesson"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCcoCX94i2eIMXWyP3wZ2dwDARcECvDMr8",
  authDomain: "science-read.firebaseapp.com",
  projectId: "science-read",
  storageBucket: "science-read.firebasestorage.app",
  messagingSenderId: "1070431247250",
  appId: "1:1070431247250:web:423376924d1d29224bff4b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* HOME */
function showTopics(){
  document.getElementById("home").style.display="none";
  document.getElementById("topics").style.display="block";
  loadTopics();
}

/* ADMIN LOGIN */
function login(){
  let p = prompt("Admin kod:");
  if(p==="1234"){
    document.getElementById("adminPanel").style.display="block";
  }
}

/* ADD */
function addTopic(){
  db.collection("topics").add({
    title:document.getElementById("title").value,
    desc:document.getElementById("desc").value
  });
}

/* LOAD */
function loadTopics(){
  db.collection("topics").onSnapshot(snap=>{
    let box=document.getElementById("list");
    box.innerHTML="";

    snap.forEach(doc=>{
      let d=doc.data();

      box.innerHTML+=`
        <div class="topic" onclick="openTopic('${doc.id}')">
          ${d.title}
        </div>
      `;
    });
  });
}

/* OPEN */
function openTopic(id){
  db.collection("topics").doc(id).get().then(doc=>{
    let d=doc.data();

    document.getElementById("lesson").innerHTML=`
      <h2>${d.title}</h2>
      <p>${d.desc}</p>

      <h3>📝 Test</h3>
      <button onclick="alert('To‘g‘ri')">A</button>
      <button onclick="alert('Noto‘g‘ri')">B</button>

      <h3>✍ PIRLS</h3>
      <textarea placeholder="Javob yoz..."></textarea>

      <h3>🖼 Rasm topshiriq</h3>
      <p>Rasm joylash keyin qo‘shiladi</p>
    `;
  });
}
</script>

</body>
</html>
